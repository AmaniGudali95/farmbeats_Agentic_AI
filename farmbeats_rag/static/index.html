<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmBeats AI Advisor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, sans-serif;
            background: #f0f4f0;
            color: #1a2e1a;
            min-height: 100vh;
        }

        header {
            background: #2d5a27;
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 { font-size: 20px; font-weight: 600; }
        header p  { font-size: 13px; opacity: 0.8; }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-size: 15px;
            font-weight: 600;
            color: #2d5a27;
            margin-bottom: 12px;
        }

        .field-select {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .field-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid #2d5a27;
            background: white;
            color: #2d5a27;
            cursor: pointer;
            font-size: 13px;
        }

        .field-btn.active {
            background: #2d5a27;
            color: white;
        }

        textarea {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            height: 80px;
            margin-bottom: 10px;
        }

        textarea:focus { outline: none; border-color: #2d5a27; }

        .ask-btn {
            width: 100%;
            padding: 12px;
            background: #2d5a27;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .ask-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .recommendation {
            background: #f0f7ee;
            border-left: 4px solid #2d5a27;
            border-radius: 0 8px 8px 0;
            padding: 14px;
            margin-top: 12px;
            font-size: 15px;
            line-height: 1.6;
            display: none;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .stat {
            background: #f8faf8;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: #2d5a27;
        }

        .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        .alert-item {
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .alert-high   { background: #ffeaea; border-left: 3px solid #d32f2f; }
        .alert-medium { background: #fff8e1; border-left: 3px solid #f57c00; }
        .alert-clear  { background: #f0f7ee; border-left: 3px solid #2d5a27; }

        .loading { color: #666; font-size: 14px; font-style: italic; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>🌱 FarmBeats AI Advisor</h1>
        <p>Data-driven advice for your farm</p>
    </div>
</header>

<div class="container">

    <!-- Ask a question -->
    <div class="card">
        <h2>Ask your farming advisor</h2>

        <div class="field-select">
            <button class="field-btn active" onclick="selectField('field_a', this)">Field A</button>
            <button class="field-btn" onclick="selectField('field_b', this)">Field B</button>
            <button class="field-btn" onclick="selectField('field_c', this)">Field C</button>
        </div>

        <textarea id="question"
                  placeholder="Ask anything... e.g. Should I irrigate today? Is my crop healthy?">Should I irrigate my corn today?</textarea>

        <button class="ask-btn" onclick="askQuestion()" id="askBtn">
            Get Recommendation
        </button>

        <div class="recommendation" id="recommendation"></div>

        <div id="feedbackBtns" style="display:none; margin-top:10px; text-align:center">
    <span style="font-size:13px; color:#666; margin-right:10px">
        Was this helpful?
    </span>
            <button onclick="sendFeedback('helpful')"
                    style="font-size:18px; border:none; background:none; cursor:pointer">
                👍
            </button>
            <button onclick="sendFeedback('not_helpful')"
                    style="font-size:18px; border:none; background:none; cursor:pointer">
                👎
            </button>
        </div>
    </div>

    <!-- Live sensor data -->
    <div class="card">
        <h2>Live field conditions</h2>
        <div class="stats" id="sensorStats">
            <div class="stat">
                <div class="stat-value" id="moisture">--</div>
                <div class="stat-label">Soil Moisture %</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="temperature">--</div>
                <div class="stat-label">Temperature °C</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="humidity">--</div>
                <div class="stat-label">Humidity %</div>
            </div>
        </div>
    </div>

    <!-- Alerts -->
    <div class="card">
        <h2>Field alerts</h2>
        <div id="alerts"><p class="loading">Loading alerts...</p></div>
    </div>

</div>

<script>
    let selectedField = 'field_a';
    let lastRecommendation = '';

    function selectField(field, btn) {
    selectedField = field;
    document.querySelectorAll('.field-btn')
            .forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadSensorData();
    loadAlerts();        // ← add this line
}

    async function askQuestion() {
        const question = document.getElementById('question').value;
        const btn      = document.getElementById('askBtn');
        const recDiv   = document.getElementById('recommendation');

        if (!question.trim()) return;

        btn.disabled    = true;
        btn.textContent = 'Thinking...';
        recDiv.style.display = 'none';

        try {
            const response = await fetch('http://127.0.0.1:8000/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    question: question,
                    field_id: selectedField
                })
            });
            const data = await response.json();
            recDiv.textContent     = data.recommendation;
            recDiv.style.display   = 'block';
            // Update sensor stats from response
            if (data.sensor_data) {
                document.getElementById('moisture')
                        .textContent = data.sensor_data.soil_moisture;
                document.getElementById('temperature')
                        .textContent = data.sensor_data.temperature;
                document.getElementById('humidity')
                        .textContent = data.sensor_data.humidity;
            }
            lastRecommendation = data.recommendation;
            document.getElementById('feedbackBtns').style.display = 'block';
        } catch (e) {
            recDiv.textContent   = 'Error connecting to advisor. Is the server running?';
            recDiv.style.display = 'block';
        }

        btn.disabled    = false;
        btn.textContent = 'Get Recommendation';
    }

    async function loadSensorData() {
        try {
            const r    = await fetch(`http://127.0.0.1:8000/sensor/${selectedField}`);
            const data = await r.json();
            document.getElementById('moisture')
                    .textContent = data.soil_moisture;
            document.getElementById('temperature')
                    .textContent = data.temperature;
            document.getElementById('humidity')
                    .textContent = data.humidity;
        } catch(e) {}
    }

    async function loadAlerts() {
    try {
        const r    = await fetch('http://127.0.0.1:8000/alerts');
        const data = await r.json();
        const div  = document.getElementById('alerts');
        div.innerHTML = '';

        // Filter alerts to only the selected field
        const fieldAlerts = data.alerts.filter(alert =>
            alert.field === selectedField
        );

        if (fieldAlerts.length === 0) {
            div.innerHTML =
                '<div class="alert-item alert-clear">✓ All clear for ' +
                selectedField.toUpperCase() + '</div>';
            return;
        }

        fieldAlerts.forEach(alert => {
            const cls = alert.severity === 'high'
                      ? 'alert-high' : 'alert-medium';
            div.innerHTML +=
                `<div class="alert-item ${cls}">${alert.message}</div>`;
        });

    } catch(e) {
        document.getElementById('alerts').innerHTML =
            '<p class="loading">Could not load alerts</p>';
    }
}
async function sendFeedback(rating) {
    const question = document.getElementById('question').value;

    await fetch('http://127.0.0.1:8000/feedback', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            question:       question,
            field_id:       selectedField,
            recommendation: lastRecommendation,
            rating:         rating
        })
    });

    document.getElementById('feedbackBtns').innerHTML =
        '<span style="color:#2d5a27; font-size:13px">Thanks for your feedback ✓</span>';
}

    // Load data on page open
    loadSensorData();
    loadAlerts();
</script>

</body>
</html>
